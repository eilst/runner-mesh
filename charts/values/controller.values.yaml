# Default values for the gha-runner-scale-set-controller chart.
# This is a cluster-wide singleton — one controller manages every repo's
# scale-set. Override by editing this file before running `cluster:install`.
#
# Deliberately conservative resource requests: the controller only watches
# CRDs and reconciles Kubernetes objects, it never runs job workloads itself,
# so it fits comfortably on your smallest node.

replicaCount: 1

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 250m
    memory: 256Mi

# Pin the controller to nodes labeled for control-plane / lightweight duty,
# leaving "large"-tagged nodes free for actual runner pods. Uncomment and
# adjust to your own node labels (see docs/architecture.md).
# nodeSelector:
#   runner-mesh.dev/size: small

# Metrics are off by default in the chart itself (the 'metrics' key must be
# either fully absent or fully populated with real string addresses — the
# chart's template does not tolerate a partially-set 'metrics' object, e.g.
# a 'serviceMonitor' sub-key alone, which is not part of this chart's
# schema at all despite looking like a reasonable Prometheus-Operator
# convention). Verified against:
#   helm show values oci://ghcr.io/actions/actions-runner-controller-charts/gha-runner-scale-set-controller
# Uncomment and fill in all three fields together to enable metrics:
# metrics:
#   controllerManagerAddr: ":8080"
#   listenerAddr: ":8080"
#   listenerEndpoint: "/metrics"
