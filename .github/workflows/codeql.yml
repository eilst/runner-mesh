name: codeql

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "15 7 * * 2"

permissions:
  contents: read

jobs:
  analyze:
    # CodeQL's 'actions' language analyzes our workflow files for
    # injection and untrusted-input patterns — complements zizmor with
    # GitHub's own query packs.
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9  # v4.37.0
        with:
          languages: actions

      - uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9  # v4.37.0
