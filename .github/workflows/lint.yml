name: lint

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955  # v4.3.0
        with:
          persist-credentials: false
      - name: shellcheck
        run: shellcheck bin/runner-mesh lib/*.sh

  yamllint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955  # v4.3.0
        with:
          persist-credentials: false
      - name: yamllint
        run: |
          pip install --quiet yamllint
          yamllint -d "{extends: default, rules: {line-length: disable}}" \
            charts/values .github/workflows

  syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955  # v4.3.0
        with:
          persist-credentials: false
      - name: bash -n on every script
        run: |
          set -e
          bash -n bin/runner-mesh
          for f in lib/*.sh; do bash -n "$f"; done
