name: smoke-test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  k3d:
    runs-on: ubuntu-latest
    # doctor checks 'gh auth status', which needs a token even though this
    # job never calls the GitHub API for real — the default Actions token
    # is enough to satisfy the check (repos:*/app:init, which actually use
    # gh, aren't exercised here; see the note below).
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: install jq
        run: sudo apt-get update -y && sudo apt-get install -y jq

      - name: install helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310  # v5.0.1

      # Fetches the k3d binary directly from GitHub Releases (no script
      # execution — just a binary, chmod'd and run later like any other
      # CLI tool) rather than a third-party wrapper action:
      # AbsaOSS/k3d-action@v2 was pinned to a k3d release whose install URL
      # started 404ing, breaking every CI run. Version-pinned; Dependabot
      # doesn't track this URL, so bump deliberately.
      - name: install k3d
        run: |
          curl -fsSL -o /usr/local/bin/k3d \
            https://github.com/k3d-io/k3d/releases/download/v5.9.0/k3d-linux-amd64
          chmod +x /usr/local/bin/k3d
          k3d version

      - name: create k3d cluster
        run: k3d cluster create runner-mesh-ci --wait --timeout 120s

      # k3d's --wait covers node readiness, not API availability — the
      # server can still refuse connections for a few seconds after,
      # which flakes whatever runs next. Poll until it actually answers.
      - name: wait for the API server
        run: |
          for _ in $(seq 1 30); do
            kubectl get --raw /readyz >/dev/null 2>&1 && exit 0
            sleep 2
          done
          echo "API server never became ready"; kubectl cluster-info; exit 1

      - name: doctor (toolchain + cluster connectivity)
        run: ./bin/runner-mesh doctor

      - name: cluster:install (real ARC controller install against k3d)
        run: ./bin/runner-mesh --yes cluster:install

      - name: status
        run: ./bin/runner-mesh status

      # repos:add is intentionally not exercised here — it requires a real
      # GitHub App installation, which CI does not have credentials for.
      # See docs/quickstart-colima.md for the manual end-to-end walkthrough.

      - name: fleet:init scaffold — files exist, generated code lints
        run: |
          ./bin/runner-mesh fleet:init /tmp/fleet
          test -x /tmp/fleet/bootstrap.sh
          for f in repos.txt runner-mesh.version Makefile .gitignore README.md values/README.md; do
            test -f "/tmp/fleet/$f" || { echo "missing generated file: $f"; exit 1; }
          done
          bash -n /tmp/fleet/bootstrap.sh
          shellcheck /tmp/fleet/bootstrap.sh
          make -C /tmp/fleet -n apply prune status doctor k9s watch-runners >/dev/null

      # The shim clones the engine from RUNNER_MESH_REPO (here: this very
      # checkout, at this commit) and delegates to fleet:apply. Without App
      # credentials the correct behavior is to stop at the app:init check —
      # after preflight has passed — so assert exactly that failure mode:
      # a zero exit or a different error both fail this step.
      - name: bootstrap shim — fails closed at missing App credentials
        run: |
          echo "${GITHUB_SHA}" > /tmp/fleet/runner-mesh.version
          set +e
          out="$(cd /tmp/fleet && RUNNER_MESH_REPO="${GITHUB_WORKSPACE}" ./bootstrap.sh 2>&1)"
          code=$?
          set -e
          printf '%s\n' "${out}" | tail -3
          if [ "${code}" -eq 0 ]; then
            echo "expected bootstrap to fail without App credentials"; exit 1
          fi
          printf '%s\n' "${out}" | grep -q "app:init" \
            || { echo "unexpected failure mode:"; printf '%s\n' "${out}"; exit 1; }

      - name: cluster:uninstall
        if: always()
        run: ./bin/runner-mesh --yes cluster:uninstall || true
