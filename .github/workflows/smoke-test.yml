name: smoke-test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  k3d:
    runs-on: ubuntu-latest
    # doctor checks 'gh auth status', which needs a token even though this
    # job never calls the GitHub API for real — the default Actions token
    # is enough to satisfy the check (repos:*/app:init, which actually use
    # gh, aren't exercised here; see the note below).
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - name: install jq
        run: sudo apt-get update -y && sudo apt-get install -y jq

      - name: install helm
        uses: azure/setup-helm@v4

      # Fetches the k3d binary directly from GitHub Releases (no script
      # execution — just a binary, chmod'd and run later like any other
      # CLI tool) rather than a third-party wrapper action:
      # AbsaOSS/k3d-action@v2 was pinned to a k3d release whose install URL
      # started 404ing, breaking every CI run.
      - name: install k3d
        run: |
          curl -fsSL -o /usr/local/bin/k3d \
            https://github.com/k3d-io/k3d/releases/latest/download/k3d-linux-amd64
          chmod +x /usr/local/bin/k3d
          k3d version

      - name: create k3d cluster
        run: k3d cluster create runner-mesh-ci --wait --timeout 120s

      - name: doctor (toolchain + cluster connectivity)
        run: ./bin/runner-mesh doctor

      - name: cluster:install (real ARC controller install against k3d)
        run: ./bin/runner-mesh --yes cluster:install

      - name: status
        run: ./bin/runner-mesh status

      # repos:add is intentionally not exercised here — it requires a real
      # GitHub App installation, which CI does not have credentials for.
      # See docs/quickstart-colima.md for the manual end-to-end walkthrough.

      - name: cluster:uninstall
        if: always()
        run: ./bin/runner-mesh --yes cluster:uninstall || true
